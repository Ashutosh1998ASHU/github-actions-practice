# workflow [No indentation required for naming the workflow]
name: Hello 

# on tells when the workflow should run (GIve indentation by tab)
on:
  workflow_dispatch: 
  
# job tells what the workflow should do , there can be more than one or more than one jobs, hence we write Jobs
# jobs is an object so needs indentation
jobs: 
  # 1st Job (give indentation)
  say-hello: 
    # Creates an ephermal container with ubuntu running
    runs-on: ubuntu-latest
    # That ephermal container will have steps to execute, hence name those steps and use run: run has the commands 
    steps: 
      - name: Say hello to everyone
        run: echo "Hello Dosto"
      
# job 
# Should be inside the workflow 


# steps
# Should be inside the job

# Actions 
# Should be inside the steps
